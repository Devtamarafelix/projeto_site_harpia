<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco | H.A.R.P.I.A</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="Css/contato.css">
</head>

<body>
    <main class="pagina-contato">
        <a href="ajuda.html" class="voltar">
            <img src="assets/icons-contato/seta.svg" alt="" />
            Voltar
        </a>

        <section class="conteudo">
            <div class="titulo-contato">
                <h1>Fale Conosco</h1>
                <p>
                    Tem alguma dúvida, sugestão ou precisa de ajuda?<br />
                    Envie sua mensagem para nossa equipe.
                </p>
            </div>


            <div class="area-principal">
                <form class="formulario">
                    <div class="icone-topo">
                        <img src="assets/icons-contato/email-coracao.svg" alt="Ícone de mensagem" />
                    </div>

                    <label>
                        <span>
                            <img src="assets/icons-contato/nome.svg" alt="" />
                            Nome
                        </span>
                        <input type="text" placeholder="Digite seu nome" />
                    </label>

                    <label>
                        <span>
                            <img src="assets/icons-contato/email-verde.svg" alt="" />
                            Email
                        </span>
                        <input type="email" placeholder="Digite seu email" />
                    </label>

                    <label>
                        <span>Como podemos te ajudar?</span>
                        <input type="text" placeholder="Qual a sua dúvida ou solicitação" />
                    </label>

                    <label>
                        <span>
                            <img src="assets/icons-contato/mensagem.svg" alt="" />
                            Mensagem
                        </span>
                        <textarea placeholder="Conte-nos mais sobre a sua dúvida ou solicitação..."></textarea>
                    </label>

                    <button type="submit">Enviar mensagem</button>
                </form>
                
            </div>

            <div class="instagram-card">
                <div class="instagram-icone">
                    <a href="https://www.instagram.com/_h.a.r.p.i.a?utm_source=qr&igsh=aTFqZzMwbDE0cTZr">
                        <img src="assets/icons-contato/instagram-circulo.svg" alt="Instagram" />
                    </a>
                </div>

                <div>
                    <h2>Siga a H.A.R.P.I.A no instagram</h2>
                    <strong>@_H.A.R.P.I.A</strong>
                    <p>Fique por dentro das novidades e conteúdos exclusivos!</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="logo">
      <img src="assets/icons-contato/logo-harpia-contato.svg" alt="Logo H.A.R.P.I.A" />
    </div>

    <div class="contatos">
      <div>
        <a href="mailto:entre.em.contato.harpia@gmail.com ">
            <img src="assets/icons-contato/email.svg" alt="" />
        </a>
        <span>entre.em.contato.harpia@gmail.com</span>
      </div>

      <span class="linha">|</span>

      <div>
        <a href="https://www.instagram.com/_h.a.r.p.i.a/">
            <img src="assets/icons-contato/instagram.svg" alt="" />
        </a>
        <span>@_H.A.R.P.I.A</span>
      </div>
    </div>
    </footer>

</body>

</html>

<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Exercício de Programação | H.A.R.P.I.A.</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="Css\html-exercicio1.css" />

    <link rel="stylesheet" href="Css/acessibilidade.css" />
    <script src="JavaScript/config.js" defer></script>
    <script src="JavaScript/global.js" defer></script>
    <script src="JavaScript/quiz.js" defer></script>
</head>

<body>
    <aside class="sidebar">
        <header class="sidebar-header">
            <img src="assets/imgs/Logo_HARPIA.png" alt="Logo da plataforma H.A.R.P.I.A." />

            <div class="logo-container">
                <p class="logo-titulo">
                    H.<span>A</span>.R.<span>P</span>.I.<span>A</span>
                </p>
                <p class="logo-subtitulo">Aprenda do seu jeito</p>
            </div>
        </header>

        <nav class="sidebar-nav" aria-label="Menu principal">
            <ul>
                <li>
                    <a href="index.html">
                        <img src="assets/icons-explorar-cursos/inicio.svg" alt="" />
                        Início
                    </a>
                </li>

                <li>
                    <a href="pg-usuario.html">
                        <img src="assets/icons-explorar-cursos/perfil.svg" alt="" />
                        Meu Perfil
                    </a>
                </li>

                <li>
                    <a href="pg-explorar-cursos.html">
                        <img src="assets/icons-explorar-cursos/explorar-cursos.svg" alt="" />
                        Explorar Cursos
                    </a>
                </li>

                <li>
                    <a href="ajuda.html">
                        <img src="assets/icons-explorar-cursos/ajuda.svg" alt="" />
                        Ajuda
                    </a>
                </li>
            </ul>
        </nav>

        <div class="user-perfil">
            <img src="assets/img-explorar-cursos/avatar.jpg" alt="Foto de perfil da aluna Maria Silva"
                class="img-avatar foto-perfil-dinamica" />

            <div class="user-texto">
                <p class="user-nome" id="nome-menu-lateral">Maria Silva</p>
                <p class="user-xp">1.900 XP - Nível Iniciante</p>
            </div>

            <button type="button" class="btn-sair">
                <img src="assets/icons-explorar-cursos/sair.svg" alt="" />
                Sair
            </button>
        </div>
    </aside>

    <main class="main-container">
        <header class="aula-header">
            <p class="aula-caminho">Meus Cursos &gt; Programação</p>
            <h1>Introdução HTML </h1>
        </header>

        <nav class="abas-aula" aria-label="Navegação da aula">
            <a href="progamacao-html-aula.html" class="aba-aula">
                <span aria-hidden="true">▶</span>
                Leitura
            </a>

            <a href="html-exercicio1.html" class="aba-aula active" aria-current="page">
                <span aria-hidden="true">▶</span>
                Exercícios
            </a>
        </nav>

        <section class="progresso-exercicio" aria-label="Progresso do exercício">
            <div class="progresso-textos">
                <span class="contador-questoes">
                    Questão <strong id="questao-atual">1</strong> de
                    <strong id="total-questoes">3</strong>
                </span>

                <span class="contador-acertos">
                    Sucesso <strong id="total-acertos">0</strong> /
                    <strong id="total-respondidas">0</strong>
                </span>
            </div>

            <div class="barra-progresso" role="progressbar" aria-label="Progresso das questões" aria-valuemin="0"
                aria-valuemax="3" aria-valuenow="1">
                <div class="barra-preenchida" id="barra-preenchida"></div>
            </div>
        </section>

        <section class="card-exercicio" aria-labelledby="titulo-pergunta">
            <figure class="imagem-exercicio">
                <img src="assets\img-programação\html-tags.png"
                    alt="Ilustração utilizada para interpretação de texto não verbal" />

                <figcaption class="descricao-imagem">
                    Observe atentamente a ilustração para responder à questão.
                </figcaption>
            </figure>

            <div class="conteudo-exercicio">
                <h2 class="quiz-pergunta" id="titulo-pergunta">
                    Qual é a principal função do HTML?
                </h2>

                <div class="alternativas" id="quiz-opcoes" role="group" aria-label="Alternativas da questão">
                    <button type="button" class="opcao-resposta" data-opcao="A" data-correta="false"
                        aria-pressed="false">
                        <span class="opcao-letra">(A)</span>
                        <span class="opcao-texto">
                            Alterar as cores e o visual de uma página.
                        </span>
                    </button>

                    <button type="button" class="opcao-resposta" data-opcao="B" data-correta="true"
                        aria-pressed="false">
                        <span class="opcao-letra">(B)</span>
                        <span class="opcao-texto">
                             Criar e organizar a estrutura e o conteúdo de uma página.
                        </span>
                    </button>

                    <button type="button" class="opcao-resposta" data-opcao="C" data-correta="false"
                        aria-pressed="false">
                        <span class="opcao-letra">(C)</span>
                        <span class="opcao-texto">
                             Proteger o computador contra vírus.
                        </span>
                    </button>
                </div>

                <div class="quiz-feedback" id="quiz-feedback" aria-live="polite" hidden>
                    <p class="feedback-titulo" id="feedback-titulo"></p>
                    <p class="feedback-explicacao" id="feedback-explicacao"></p>
                </div>

                <div class="quiz-acoes">
                    <button type="button" class="btn-confirmar" id="btn-confirmar" disabled>
                        Confirmar Resposta
                    </button>

                    <button type="button" class="btn-proxima" id="btn-proxima"
                        data-proxima-pagina="portugues-exercicio2.html" hidden>
                        Próxima Questão
                    </button>
                </div>
            </div>
        </section>
    </main>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

    <script>
        new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sienna-accessibility/dist/sienna-accessibility.umd.js"></script>
</body>

</html>

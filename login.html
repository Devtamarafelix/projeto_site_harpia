<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página Login</title>

    <link rel="stylesheet" href="Css/login.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="login-container">
      <section class="lado-esquerdo">
        <div class="logo">
          <img src="assets/imgs/Logo_HARPIA.png" alt="Logo da HARPIA" />

          <div class="titulo-container">
            <h1>H.<span>A</span>.R.<span>P</span>.I.<span>A</span></h1>
            <p class="subtitulo">aprenda do seu jeito</p>
          </div>
        </div>

        <div class="banner-pluma">
          <h2>Aprender do seu Jeito.</h2>
          <p>
            Uma plataforma que se adapta a você e transforma seus estudos em
            conquistas.
          </p>

          <img
            src="assets/imgs/Pluma.png"
            alt="Mascote Pluma"
            class="mascote-pluma"
          />
        </div>

        <!-- svg da imagem da onda verde -->
        <svg
          width="100%"
          height="auto"
          viewBox="0 0 611 400"
          preserveAspectRatio="none"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          class="onda-verde"
          aria-hidden="true"
        >
          <path
            d="M277.428 106.238C135.92 -54.5083 62.3672 -21.7213 0.5 135.459V399.5H610.5V44.4795C572.559 199.224 499.843 295.701 332.055 154.281L277.428 106.238Z"
            fill="#1B4332"
            fill-opacity=""
            stroke="#1B4332"
            stroke-opacity="0.71"
          />
        </svg>
      </section>

      <section class="lado-direito">
        <div class="login-conta">
          <div class="form-header">
            <h2>Bem vindo(a) de volta!</h2>
            <p>
              Entre com sua conta para continuar sua jornada de aprendizagem.
            </p>
          </div>

          <form action="pg-usuario.html" method="get">
            <div class="form-group">
              <label for="usuario">Email ou Nome de Usuário:</label>

              <div class="input-container">
                <img src="assets/icons-login-e-cadastro/icon-usuario.svg" alt="" class="icon-input" aria-hidden="true">
                <input
                type="text"
                id="usuario"
                placeholder="Digite seu email ou user"
                required
              />
              </div>
            </div>

            <div class="form-group">
              <label for="senha">Senha:</label>
              <div class="input-container">
                <img src="assets/icons-login-e-cadastro/cadeado-senha.svg" alt="" class="icon-input" aria-hidden="true">
                <input
                type="password"
                id="senha"
                placeholder="Digite sua senha"
                required
              />
              </div>
              <a href="Esqueceu-Senha.html" class="link-esqueceu-senha"
                >Esqueceu sua senha?</a
              >
            </div>

            <button type="submit" class="btn-entrar">
              <img src="assets/icons-login-e-cadastro/entrar.svg" alt="" aria-hidden="true">
              Entrar
          </button>

            <div class="divisor">
              <span>ou</span>
            </div>

            <button type="button" class="btn-google">
              <img
                src="assets/icons-login-e-cadastro/icon-google.svg"
                alt="logo do Google"
                class="icon-google"
              />
              Entrar com o Google
            </button>

            <p class="form-footer">
              Não tem uma conta? <a href="cadastro.html">Crie sua conta</a>
            </p>
          </form>
        </div>
      </section>
    </main>

    <!-- Plugin VLibras -->

    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script src="JavaScript/login.js"></script>

    <!-- plugin acessibiidade -->
    <script
      src="https://cdn.jsdelivr.net/npm/sienna-accessibility/dist/sienna-accessibility.umd.js"
      async
    ></script>
  </body>
</html>
